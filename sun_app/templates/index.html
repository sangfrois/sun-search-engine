<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SUN Search</title>

<link rel="manifest" href="/static/manifest.json">
<link rel="icon" type="image/svg+xml" href="/static/sun-tulip-final.svg">
<link rel="apple-touch-icon" href="/static/sun-tulip-final.svg">
<meta name="theme-color" content="#ffab00">


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf9f6;
    --bg-grad: radial-gradient(circle at 50% -20%, #fef08a 0%, #faf9f6 40%);
    --text: #2c2c2c;
    --acc: #d97706; /* dark orange for light mode */
    --inp-bg: #ffffff;
    --inp-bord: #e5e5e5;
    --link: #b45309;
    --url: #15803d;
    --sub: #666;
    --card-bg: #ffffff;
    --card-shadow: 0 4px 20px rgba(0,0,0,0.04);
    --sug-bg: #ffffff;
    --sug-hov: #f9f9f9;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0d0d0d;
      --bg-grad: radial-gradient(circle at 50% -20%, #3a2503 0%, #0d0d0d 50%);
      --text: #e8e8e8;
      --acc: #ffab00; /* golden */
      --inp-bg: #161616;
      --inp-bord: #2a2a2a;
      --link: #ffab00; /* match accent */
      --url: #4ade80;
      --sub: #999;
      --card-bg: #121212;
      --card-shadow: 0 4px 20px rgba(0,0,0,0.4);
      --sug-bg: #1a1a1a;
      --sug-hov: #2a2a2a;
    }
  }
  body { 
    font-family: 'Inter', -apple-system, sans-serif; 
    background: var(--bg); 
    background-image: var(--bg-grad);
    background-attachment: fixed;
    color: var(--text); 
    margin: 0; 
    padding: 60px 20px; 
    min-height: 100vh;
    transition: background 0.4s, color 0.4s; 
  }
  .container { max-width: 680px; margin: auto; position: relative; }
  h1 { 
    text-align: center; 
    color: var(--acc); 
    font-family: 'Playfair Display', serif; 
    font-size: 3.5rem;
    font-weight: 700; 
    letter-spacing: 1px; 
    margin-bottom: 40px;
    text-shadow: 0 2px 20px rgba(255, 171, 0, 0.25);
  }
  .search-wrapper { position: relative; margin-bottom: 40px; }
  .search-icon {
    position: absolute;
    left: 20px;
    top: 50%;
    transform: translateY(-50%);
    width: 20px;
    height: 20px;
    fill: var(--sub);
    z-index: 2;
  }
  input[type="text"] { 
    width: 100%; 
    padding: 18px 25px 18px 55px; 
    border-radius: 30px; 
    border: 1px solid var(--inp-bord); 
    background: var(--inp-bg); 
    color: var(--text); 
    font-size: 1.1rem; 
    box-sizing: border-box; 
    outline: none; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1); 
  }
  input[type="text"]:focus { 
    box-shadow: 0 0 0 2px var(--acc), 0 8px 25px rgba(255, 171, 0, 0.15); 
    border-color: transparent;
  }
  .suggestions { position: absolute; top: 60px; left: 0; right: 0; background: var(--sug-bg); border-radius: 18px; overflow: hidden; z-index: 10; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--inp-bord); }
  .suggestion-item { padding: 14px 20px 14px 55px; cursor: pointer; border-bottom: 1px solid var(--inp-bord); color: var(--text); display: flex; align-items: center; justify-content: space-between; font-size: 1.05rem; }
  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: var(--sug-hov); }
  .suggestion-item.rl-source { color: var(--acc); font-weight: 500; }
  .rl-badge { font-size: 10px; background: rgba(255, 171, 0, 0.15); padding: 3px 8px; border-radius: 12px; color: var(--acc); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
  
  /* Arranged Results - Card Style */
  .result { 
    background: var(--card-bg);
    border: 1px solid var(--inp-bord);
    border-radius: 16px;
    padding: 24px;
    margin-bottom: 24px; 
    box-shadow: var(--card-shadow);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  .result:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 30px rgba(0,0,0,0.12);
    border-color: var(--acc);
  }
  .title { 
    color: var(--link); 
    text-decoration: none; 
    font-size: 1.35rem; 
    font-family: 'Lora', serif; 
    display: block; 
    margin-bottom: 8px; 
    line-height: 1.3; 
    font-weight: 500;
  }
  .title:hover { text-decoration: underline; }
  .url { color: var(--url); font-size: 0.85rem; margin-bottom: 12px; font-family: monospace; letter-spacing: 0.5px; opacity: 0.9; }
  .content { font-size: 1rem; color: var(--sub); line-height: 1.6; font-family: 'Inter', sans-serif; font-weight: 300; }
</style>
</head>
<body>
<div class="container">
  <h1>SUN.</h1>
  <form action="/search" method="get" id="searchForm">
    <div class="search-wrapper">
      
      <svg class="search-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
      </svg>
      <input type="text"
 name="q" id="searchInput" placeholder="Search the unbound network..." value="{{ query or '' }}" autocomplete="off">
      <div id="suggestions" class="suggestions"></div>
    </div>
  </form>
  {% if results %}
    {% for r in results %}
      <div class="result">
        <a class="title" href="/click?url={{ r.url | urlencode }}&title={{ r.title | urlencode }}">{{ r.title }}</a>
        <div class="url">{{ r.url[:60] }}...</div>
        <div class="content">{{ r.content[:150] }}</div>
      </div>
    {% endfor %}
  {% endif %}
</div>


<script>
  const input = document.getElementById('searchInput');
  const suggestionsBox = document.getElementById('suggestions');
  let debounceTimer;
  const suggestionCache = {}; // Client-side cache for instantaneous typing

  input.addEventListener('input', function() {
    clearTimeout(debounceTimer);
    const q = this.value.trim().toLowerCase();
    
    if (q.length < 2) {
      suggestionsBox.style.display = 'none';
      return;
    }

    // Instant hit from cache if available
    if (suggestionCache[q]) {
      renderSuggestions(suggestionCache[q]);
      return;
    }

    // Lowered debounce from 200ms to 75ms for snappier feel
    debounceTimer = setTimeout(async () => {
      try {
        const res = await fetch('/autocomplete?q=' + encodeURIComponent(q));
        const suggestions = await res.json();
        suggestionCache[q] = suggestions; // Save to cache
        renderSuggestions(suggestions);
      } catch (e) {
        console.error(e);
      }
    }, 75);
  });

  function renderSuggestions(suggestions) {
    if (suggestions.length > 0) {
      suggestionsBox.innerHTML = '';
      suggestions.forEach(sug => {
        const div = document.createElement('div');
        div.className = 'suggestion-item ' + (sug.source === 'rl' ? 'rl-source' : '');
        
        const textSpan = document.createElement('span');
        textSpan.textContent = sug.text;
        div.appendChild(textSpan);
        
        if (sug.source === 'rl') {
          const badge = document.createElement('span');
          badge.className = 'rl-badge';
          badge.textContent = 'Personalized';
          div.appendChild(badge);
        }
        
        div.onclick = function() {
          input.value = sug.text;
          suggestionsBox.style.display = 'none';
          document.getElementById('searchForm').submit();
        };
        suggestionsBox.appendChild(div);
      });
      suggestionsBox.style.display = 'block';
    } else {
      suggestionsBox.style.display = 'none';
    }
  }

  document.addEventListener('click', function(e) {
    if (e.target !== input) {
      suggestionsBox.style.display = 'none';
    }
  });
</script>

</body>
</html>
